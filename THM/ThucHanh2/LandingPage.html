<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Travel Landing Page</title>
    <link rel="stylesheet" href="LandingPage.css" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- HEADER -->
    <header>
      <div class="logo">TRAVEL GOALS</div>
      <nav>
        <a href="#">Destinations</a>
        <a href="#">About</a>
      </nav>
    </header>

    <!-- HERO SECTION -->
    <main>
      <section class="hero">
        <div class="hero-content">
          <h1>JOE'S TRAVEL PAGE</h1>
          <p>LET'S EXPLORE THE WORLD TOGETHER</p>
          <button>Discover places</button>
        </div>
      </section>

      <!-- HIGHLIGHTS -->
      <section class="highlights">
        <h2>HIGHLIGHTS</h2>

        <div class="cards">
          <div class="card">
            <img
              src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e"
              alt="Miami"
            />
            <p>MIAMI <span>USA</span></p>
          </div>

          <div class="card">
            <img
              src="https://images.unsplash.com/photo-1505761671935-60b3a7427bad"
              alt="Munich"
            />
            <p>MUNICH <span>GERMANY</span></p>
          </div>

          <div class="card">
            <img
              src="https://images.unsplash.com/photo-1502602898657-3e91760cbb34"
              alt="Barcelona"
            />
            <p>BARCELONA <span>SPAIN</span></p>
          </div>
        </div>
      </section>
    </main>

    <!-- FOOTER -->
    <footer>
      <i class="fa-brands fa-instagram"></i>
      <i class="fa-brands fa-facebook"></i>
    </footer>
  </body>
</html>
